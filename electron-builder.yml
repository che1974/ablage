appId: com.ablage.app
productName: Ablage
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - package.json
asar: true
npmRebuild: true
nodeGypRebuild: false
mac:
  category: public.app-category.productivity
  artifactName: "Ablage-${version}-mac-${arch}.${ext}"
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
win:
  artifactName: "Ablage-${version}-win-${arch}.${ext}"
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
nsis:
  oneClick: true
  allowToChangeInstallationDirectory: false
linux:
  artifactName: "Ablage-${version}-linux-${arch}.${ext}"
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Utility

publish:
  provider: github
